
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Socialnow / Studio</title>
    <link rel="icon" type="image/webp" href="https://storage.googleapis.com/socialnow_branding/SocialNow%20Favicon%20V6.webp" />
    <!-- FIX #16: For production, replace this CDN with the Tailwind Vite plugin for tree-shaking.
         Install: npm install -D tailwindcss @tailwindcss/vite
         Then add tailwindcss() to vite.config.ts plugins and remove this script. -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

      html, body {
        font-family: 'Inter', sans-serif;
        background-color: #09090b;
        color: #e4e4e7;
        height: 100%;
        width: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        position: fixed;
        touch-action: pan-x pan-y;
      }

      @media screen and (max-width: 768px) {
        input, textarea, select {
          font-size: 16px !important;
        }
      }

      .font-mono {
        font-family: 'JetBrains Mono', monospace;
      }
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #27272a;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3f3f46;
      }

      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-4px); }
      }
      .animate-float {
        animation: float 4s ease-in-out infinite;
      }
    </style>
  <!-- FIX #4: Firebase importmap versions now match package.json (v12.x).
       Previously these pointed to v10.13.1 while package.json had v12.8.0,
       causing silent runtime failures with incompatible APIs. -->
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "firebase/app": "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js",
    "firebase/firestore/lite": "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore-lite.js",
    "firebase/storage": "https://www.gstatic.com/firebasejs/12.8.0/firebase-storage.js",
    "firebase/analytics": "https://www.gstatic.com/firebasejs/12.8.0/firebase-analytics.js",
    "jszip": "https://esm.sh/jszip@3.10.1",
    "firebase/": "https://esm.sh/firebase@^12.8.0/",
    "pdfjs-dist": "https://esm.sh/pdfjs-dist@4.0.379"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
